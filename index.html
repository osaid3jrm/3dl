<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>وزارة العدل | Dz CiTy</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --gold: #c5a059;
  --gold-light: #e2c275;
  --white: #ffffff;
  --gray: #f5f5f5;
  --text: #2c2c2c;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma;
  display: flex;
  height: 100vh;
  background: var(--gray);
}

/* SIDEBAR */
.sidebar {
  width: 300px;
  background: white;
  border-left: 4px solid var(--gold);
  box-shadow: 0 0 20px rgba(0,0,0,0.05);
}

.sidebar-header {
  text-align: center;
  padding: 30px;
}

.sidebar-header i {
  font-size: 50px;
  color: var(--gold);
}

/* LOGO */
.logo-img {
  width: 90px;
  margin: 15px 0;
  filter: drop-shadow(0 0 8px rgba(0,0,0,0.2));
}

.sidebar-header h2 {
  color: var(--gold);
  margin: 5px 0;
}

.nav-item {
  padding: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  border-right: 4px solid transparent;
  transition: 0.3s;
}

.nav-item:hover {
  background: #f9f3e7;
}

.nav-item.active {
  border-right: 4px solid var(--gold);
  color: var(--gold);
  background: #f9f3e7;
}

/* CONTENT */
.main {
  flex: 1;
  padding: 40px;
  position: relative;
}

/* BACKGROUND LOGO */
.main::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url('https://cdn.discordapp.com/attachments/1365410832871067689/1488720918271496513/Seal_of_the_United_States_Department_of_Justice.svg.png') no-repeat center;
  background-size: 350px;
  opacity: 0.05;
}

/* CARD */
.card {
  position: relative;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  display: none;
  animation: fade 0.4s;
}

.card.active {
  display: block;
}

h1 {
  color: var(--gold);
  border-bottom: 2px solid var(--gold-light);
  padding-bottom: 10px;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

input:focus, textarea:focus {
  border-color: var(--gold);
  outline: none;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 15px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(to bottom, var(--gold-light), var(--gold));
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
}

/* ANIMATION */
@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="sidebar-header">
    <i class="fas fa-balance-scale"></i>

    <img class="logo-img"
    src="C:\Users\Lenovo\Downloads\Seal_of_the_United_States_Department_of_Justice.svg.png">

    <h2>Dz CiTy</h2>
    <p>وزارة العدل</p>
  </div>

  <div class="nav-item active" onclick="show('job', this)">طلب توظيف</div>
  <div class="nav-item" onclick="show('fbi', this)">FBI</div>
  <div class="nav-item" onclick="show('raid', this)">مداهمة</div>
  <div class="nav-item" onclick="show('lawyer', this)">محامي</div>
  <div class="nav-item" onclick="show('case', this)">قضية</div>
</div>

<div class="main">

<div id="job" class="card active">
<h1>طلب توظيف</h1>
<input placeholder="اسمك">
<input placeholder="ديسكورد">
<textarea placeholder="خبراتك"></textarea>
<select>
<option>اختر التخصص</option>
<option>قاضي</option>
<option>محامي</option>
</select>
<button onclick="alert('تم الإرسال')">إرسال</button>
</div>

<div id="fbi" class="card">
<h1>تقديم FBI</h1>
<input placeholder="اسمك">
<input placeholder="ديسكورد">
<textarea placeholder="خبراتك"></textarea>
<button onclick="alert('تم الإرسال')">إرسال</button>
</div>

<div id="raid" class="card">
<h1>تصريح مداهمة</h1>
<select>
<option>منزل</option>
<option>تجمع</option>
<option>شخص</option>
</select>
<input placeholder="الجهة">
<textarea placeholder="السبب"></textarea>
<input type="date">
<input type="time">
<button>إرسال</button>
</div>

<div id="lawyer" class="card">
<h1>طلب محامي</h1>
<input placeholder="يوزر">
<select>
<option>مدنية</option>
<option>جنائية</option>
<option>عسكرية</option>
</select>
<input placeholder="المبلغ">
<button>إرسال</button>
</div>

<div id="case" class="card">
<h1>رفع قضية</h1>
<input placeholder="اسمك">
<input placeholder="يوزرك">
<input placeholder="الخصم">
<select>
<option>جنائية</option>
<option>عسكرية</option>
<option>مدنية</option>
</select>
<textarea placeholder="السبب"></textarea>
<button>إرسال</button>
</div>

</div>

<script>
function show(id, el){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}
</script>

</body>
</html>
